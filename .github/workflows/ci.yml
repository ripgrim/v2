name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Boundary check
        run: bun run check:boundaries

      - name: Tests
        run: bun test
